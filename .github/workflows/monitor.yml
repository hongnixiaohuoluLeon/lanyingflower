name: monitor-new-items

on:
  schedule:
    - cron: "* * * * *"   # 每1分钟跑一次
  workflow_dispatch:

# ✅ 解决 push / checkout 权限问题（exit code 128 常见原因）
permissions:
  contents: write

# ✅ 强制使用 Node.js 24（避免未来报错）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # ✅ 最新 checkout（已支持 Node 24）
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ✅ 最新 Python setup
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ✅ 安装依赖
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      # ✅ 运行你的监控脚本（全分页 + 新增检测）
      - name: Run monitor
        run: python monitor.py

      # ✅ 如果有变更（比如记录文件），自动提交（防止128错误）
      - name: Commit & Push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git diff --cached --quiet || git commit -m "update: new items"
          git commit --allow-empty -m "trigger schedule again"
          git push
